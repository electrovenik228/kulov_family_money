services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kulov_money}
      POSTGRES_USER: ${POSTGRES_USER:-kulov}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kulov_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kulov} -d ${POSTGRES_DB:-kulov_money}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,147.45.185.185}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1,http://147.45.185.185:7777}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,http://147.45.185.185:7777}
      DJANGO_SEED_DEMO: ${DJANGO_SEED_DEMO:-false}
      DJANGO_CREATE_DEV_ADMIN: ${DJANGO_CREATE_DEV_ADMIN:-false}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_URL: postgres://${POSTGRES_USER:-kulov}:${POSTGRES_PASSWORD:-kulov_password}@db:5432/${POSTGRES_DB:-kulov_money}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - staticfiles:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers ${WEB_CONCURRENCY:-3} --timeout 120

  celery:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,147.45.185.185}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1,http://147.45.185.185:7777}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,http://147.45.185.185:7777}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_URL: postgres://${POSTGRES_USER:-kulov}:${POSTGRES_PASSWORD:-kulov_password}@db:5432/${POSTGRES_DB:-kulov_money}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DJANGO_SEED_DEMO: "false"
      DJANGO_CREATE_DEV_ADMIN: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A config worker -l info

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_API_BASE: /api
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-7777}:80"
    volumes:
      - staticfiles:/app/staticfiles:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  staticfiles:
